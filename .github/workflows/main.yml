name: CI
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run build
      - run: npm install -g @modelcontextprotocol/server-everything
      - run: node dist/cli.js generate --command mcp-server-everything
      - run: node dist/cli.js validate .well-known/mcp.json
      - run: node dist/cli.js search email
